services:
  llm-proxy:
    image: ghcr.io/lab34/llm-proxy:latest
    ports:
      - "8080:8080"
    environment:
      - ADMIN_TOKEN=change-me-to-a-secure-token
      - ADDR=:8080
      - DSN=/data/llm-proxy.db
    volumes:
      - llm-proxy-data:/data
    restart: unless-stopped

volumes:
  llm-proxy-data:
